name: CI

on:
  push:
    branches: [main, 'refactor/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate content-collections types
        run: pnpm exec content-collections build
      - run: pnpm typecheck
      - run: pnpm check
      - run: pnpm test

  e2e:
    # NOTE: pnpm build here acts as a production build smoke test.
    # Playwright runs against the dev server (pnpm dev), which playwright.config.ts
    # starts automatically when CI=true (reuseExistingServer becomes false).
    # The build step runs first to catch any SSR/compilation errors before e2e.
    name: Playwright E2E + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI budget
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lighthouse CI
        run: pnpm exec lhci autorun
